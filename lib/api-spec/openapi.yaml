openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: News Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: articles
  - name: categories
  - name: admin
  - name: epapers
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /articles:
    get:
      operationId: getArticles
      tags: [articles]
      summary: List published articles
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of articles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleList"
    post:
      operationId: createArticle
      tags: [articles]
      summary: Create new article
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateArticleBody"
      responses:
        "201":
          description: Article created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"

  /articles/featured:
    get:
      operationId: getFeaturedArticles
      tags: [articles]
      summary: Get featured articles
      responses:
        "200":
          description: Featured articles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleList"

  /articles/latest:
    get:
      operationId: getLatestArticles
      tags: [articles]
      summary: Get latest articles
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Latest articles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleList"

  /articles/{id}:
    get:
      operationId: getArticle
      tags: [articles]
      summary: Get article by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    put:
      operationId: updateArticle
      tags: [articles]
      summary: Update article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateArticleBody"
      responses:
        "200":
          description: Updated article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
    delete:
      operationId: deleteArticle
      tags: [articles]
      summary: Delete article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /articles/{id}/publish:
    post:
      operationId: publishArticle
      tags: [articles]
      summary: Publish or unpublish article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishBody"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"

  /categories:
    get:
      operationId: getCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryList"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryBody"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin dashboard stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/articles:
    get:
      operationId: getAdminArticles
      tags: [admin]
      summary: Get all articles for admin (including drafts)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, published, all]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: All articles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleList"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /epapers:
    get:
      operationId: getEpapers
      tags: [epapers]
      summary: List all epapers
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Epapers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EpaperList"
    post:
      operationId: createEpaper
      tags: [epapers]
      summary: Create epaper
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEpaperBody"
      responses:
        "201":
          description: Epaper created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Epaper"

  /epapers/{id}:
    delete:
      operationId: deleteEpaper
      tags: [epapers]
      summary: Delete epaper
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content.
          content:
            '*/*':
              schema:
                type: string
                format: binary

  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content.
          content:
            '*/*':
              schema:
                type: string
                format: binary

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Article:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        summary:
          type: string
        content:
          type: string
        imageUrl:
          type: string
        videoUrl:
          type: string
        categoryId:
          type: integer
        categoryName:
          type: string
        author:
          type: string
        isPublished:
          type: boolean
        isFeatured:
          type: boolean
        viewCount:
          type: integer
        publishedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, title, slug, content, author, isPublished, isFeatured, viewCount, createdAt, updatedAt]

    ArticleList:
      type: object
      properties:
        articles:
          type: array
          items:
            $ref: "#/components/schemas/Article"
        total:
          type: integer
      required: [articles, total]

    CreateArticleBody:
      type: object
      properties:
        title:
          type: string
        summary:
          type: string
        content:
          type: string
        imageUrl:
          type: string
        videoUrl:
          type: string
        categoryId:
          type: integer
        author:
          type: string
        isPublished:
          type: boolean
        isFeatured:
          type: boolean
      required: [title, content, author]

    PublishBody:
      type: object
      properties:
        isPublished:
          type: boolean
        isFeatured:
          type: boolean
      required: [isPublished]

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        color:
          type: string
        articleCount:
          type: integer
      required: [id, name, slug]

    CategoryList:
      type: object
      properties:
        categories:
          type: array
          items:
            $ref: "#/components/schemas/Category"
      required: [categories]

    CreateCategoryBody:
      type: object
      properties:
        name:
          type: string
        color:
          type: string
      required: [name]

    AdminStats:
      type: object
      properties:
        totalArticles:
          type: integer
        publishedArticles:
          type: integer
        draftArticles:
          type: integer
        totalCategories:
          type: integer
        totalViews:
          type: integer
        recentArticles:
          type: array
          items:
            $ref: "#/components/schemas/Article"
      required: [totalArticles, publishedArticles, draftArticles, totalCategories, totalViews, recentArticles]

    Epaper:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        edition:
          type: string
        fileUrl:
          type: string
        thumbnailUrl:
          type: string
        pageCount:
          type: integer
        fileSize:
          type: string
        isPublished:
          type: boolean
        publishDate:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
      required: [id, title, edition, fileUrl, isPublished, publishDate, createdAt]

    EpaperList:
      type: object
      properties:
        epapers:
          type: array
          items:
            $ref: "#/components/schemas/Epaper"
        total:
          type: integer
      required: [epapers, total]

    CreateEpaperBody:
      type: object
      properties:
        title:
          type: string
        edition:
          type: string
        fileUrl:
          type: string
        thumbnailUrl:
          type: string
        pageCount:
          type: integer
        fileSize:
          type: string
        isPublished:
          type: boolean
        publishDate:
          type: string
          format: date-time
      required: [title, fileUrl]

    LoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
        token:
          type: string
        message:
          type: string
      required: [success, message]

    SuccessMessage:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success, message]

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
